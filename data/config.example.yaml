header: "Simple Dash"
description: "A simple homelab dashboard"
header_colors: ["#38bdf8", "#a855f7"]
footer: "&copy; 2026 Buzz Moody &bull; <a href='https://github.com/BuzzMoody' target='_blank'>GitHub</a> &bull; Built with ☕ and Go"
favicon: "favicon.svg"
new_tabs: true
show_only_down: false
category_colors: false

announcements:
  - text: "Welcome to your new dashboard!"
    type: "success"

buttons:
  - name: "Router"
    url: "http://192.168.1.1"
    icon: "🌐"

services:
  - name: "Portainer"
    url: "https://docker.example.com"
    category: "Infrastructure"
    logo: "portainer.svg"
    description: "Docker Management"
    api:
      url: "https://docker.example.com/api/endpoints/1/docker/info"
      headers:
        "X-API-Key": "ptr_xxxxxxxxxxxxxxx"
      mappings:
        - label: "Running"
          path: "ContainersRunning"
        - label: "Stopped"
          path: "ContainersStopped"
