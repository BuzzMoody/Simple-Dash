name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        if: github.event_name != 'pull_request'
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Redeploy Portainer Stack (Native cURL)
        if: github.event_name != 'pull_request'
        run: |
          echo "Fetching current stack state..."
          # 1. Fetch env vars from stack info
          STACK_INFO=$(curl -s -k -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" "${{ secrets.PORTAINER_URL }}/api/stacks/33")
          ENV_VARS=$(echo "$STACK_INFO" | jq -c '.Env // []')

          # 2. Fetch the current stack file content
          STACK_FILE=$(curl -s -k -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" "${{ secrets.PORTAINER_URL }}/api/stacks/33/file")
          STACK_FILE_CONTENT=$(echo "$STACK_FILE" | jq -r '.StackFileContent')

          echo "Triggering redeploy..."
          # 3. PUT with env vars + stack file content
          PAYLOAD=$(jq -n \
            --arg content "$STACK_FILE_CONTENT" \
            --argjson env "$ENV_VARS" \
            '{stackFileContent: $content, env: $env, prune: true, pullImage: true}')

          RESPONSE=$(curl -s -k -w "\nHTTP_STATUS:%{http_code}" -X PUT "${{ secrets.PORTAINER_URL }}/api/stacks/33?endpointId=3" \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d':' -f2)

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Stack successfully redeployed!"
          else
            echo "❌ Failed to redeploy. HTTP Status: $HTTP_STATUS"
            echo "Response: $RESPONSE"
            exit 1
          fi
